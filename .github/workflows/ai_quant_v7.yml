name: AI Quant V7 Daily Bot

on:
  schedule:
    # 🌟 1. 새벽 6시 05분 (KST) - [2시간짜리 크롤링 노가다 사전 실행]
    # 장 열리기 전 트래픽 한가할 때 스캔을 돌려 CSV 파일로 구워둡니다.
    - cron: '05 21 * * 0-4'
    
    # 🌟 2. 아침 8시 33분 (KST) - [즉시 알람 발송]
    # 크롤링 없이 아까 구워둔 CSV만 1초 만에 쏙 읽어서 S/A급 공략주만 디스코드로 쏩니다.
    - cron: '33 23 * * 0-4'
    
    # 🌟 3. 오후 3시 30분 (KST) - [마감 크롤링 및 정산]
    # 장 마감 직후 2시간 크롤링 시작 -> 오후 5시 30분쯤에 정산 알람이 휴대폰으로 도착합니다!
    - cron: '30 6 * * 1-5'
  
  workflow_dispatch:
    inputs:
      mode:
        description: '강제 실행할 모드를 선택하세요'
        required: true
        default: 'morning_scan'
        type: choice
        options:
          - morning_scan
          - morning_alert
          - afternoon

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: 📂 1. 저장소 체크아웃
      uses: actions/checkout@v4

    - name: 🐍 2. Python 3.10 환경 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: 📦 3. 필수 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
        pip install finance-datareader beautifulsoup4 lxml pandas numpy ta scikit-learn lightgbm joblib holidays requests

    - name: 🌅 4-1. [자동] 새벽 스캔 및 CSV 굽기 (KST 06:05)
      if: github.event.schedule == '05 21 * * 0-4'
      run: python discord_alert.py --mode morning_scan

    - name: 🚀 4-2. [자동] 장 시작 전 브리핑 알람 (KST 08:33)
      if: github.event.schedule == '33 23 * * 0-4'
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: python discord_alert.py --mode morning_alert

    - name: 🏁 4-3. [자동] 장 마감 복기 알람 (오후 3시 30분 시작 -> 5시 반 완료)
      if: github.event.schedule == '30 6 * * 1-5'
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: python discord_alert.py --mode afternoon

    - name: 🕹️ 4-4. [수동] 버튼으로 강제 실행 (테스트용)
      if: github.event_name == 'workflow_dispatch'
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: python discord_alert.py --mode ${{ inputs.mode }}

    - name: 💾 5. CSV 결과 깃허브 자동 저장 (커밋)
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "action@github.com"
        git add *.csv 2>/dev/null || true
        if ! git diff --cached --quiet; then
          git commit -m "🤖 [자동화] V7 분석 데이터 업데이트"
          git push origin main
        else
          echo "업데이트된 데이터가 없습니다."
        fi
