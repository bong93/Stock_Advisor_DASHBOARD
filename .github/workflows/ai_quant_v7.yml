name: AI Quant V7 Daily Bot

on:
  schedule:
    # 1. 새벽 전 종목 스캔 (KST 06:05 / UTC 21:05) -> 트래픽 한가함 (유지)
    - cron: '05 21 * * 0-4'
    
    # 🌟 2. 아침 스윙 타깃 알림 (KST 08:00 / UTC 23:00) -> 글로벌 자정 트래픽 전으로 대폭 앞당김!
    - cron: '00 23 * * 0-4'
    
    # 3. 장 마감 복기 (KST 18:30 / UTC 09:30) -> 트래픽 한가함 (유지)
    - cron: '30 9 * * 1-5'
  
  workflow_dispatch:
    inputs:
      mode:
        description: '강제 실행할 모드를 선택하세요'
        required: true
        default: 'morning_scan'
        type: choice
        options:
          - morning_scan
          - morning_alert
          - afternoon

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: 📂 1. 저장소 체크아웃
      uses: actions/checkout@v4

    - name: 🐍 2. Python 3.10 환경 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: 📦 3. 필수 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
        pip install finance-datareader beautifulsoup4 lxml pandas numpy ta scikit-learn lightgbm joblib holidays requests

    - name: 🌅 4-1. [자동] 새벽 스캔 및 CSV 굽기 (KST 06:05)
      if: github.event.schedule == '05 21 * * 0-4'
      run: python discord_alert.py --mode morning_scan

    - name: 🚀 4-2. [자동] 장 시작 전 브리핑 알람 (KST 08:33)
      if: github.event.schedule == '33 23 * * 0-4'
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: python discord_alert.py --mode morning_alert

    - name: 🏁 4-3. [자동] 장 마감 복기 알람 (KST 18:30)
      if: github.event.schedule == '30 9 * * 1-5'
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: python discord_alert.py --mode afternoon

    - name: 🕹️ 4-4. [수동] 버튼으로 강제 실행 (테스트용)
      if: github.event_name == 'workflow_dispatch'
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      # 사용자가 화면에서 선택한 모드(--mode)를 주입하여 실행합니다!
      run: python discord_alert.py --mode ${{ inputs.mode }}

    - name: 💾 5. CSV 결과 깃허브 자동 저장 (커밋)
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "action@github.com"
        git add *.csv 2>/dev/null || true
        if ! git diff --cached --quiet; then
          git commit -m "🤖 [자동화] V7 분석 데이터 업데이트"
          git push origin main
        else
          echo "업데이트된 데이터가 없습니다."
        fi
